# =============================================================================
# Ubuntu-Hermes — hardened Ubuntu Server VM (Lima/vz translation of the
# Parallels-based provisioning checklist)
# =============================================================================
#
# How to use:
#   See README.md > Section D. Day-to-day operations are wrapped in
#   ./scripts/setup.sh, ./scripts/start.sh, ./scripts/shell.sh, etc.
#   No path is hardcoded in this file or the scripts; configuration is
#   driven by the HERMES_VM_HOME and LIMA_HOME environment variables.
#
# Plan drift from the Parallels-targeted checklist (intentional):
#
#   • Hypervisor: Parallels Desktop is not installed. We use Lima 2.1.1 with
#     the Apple Virtualization Framework (vz) backend. Native ARM64, no GUI.
#
#   • Sections 2, 3.1, 5 (download ISO, GUI install, partitioning) are SKIPPED.
#     Lima boots an Ubuntu 24.04 cloud image — already installed. Root is
#     ext4 (cloud-image default).
#
#   • Section 4.x (Parallels-specific clipboard / drag-drop / shared profile /
#     smart-mount / isolate-vm) is unnecessary: vz/Lima cloud images don't
#     expose those host-integration features. `mounts: []` makes intent explicit.
#
#   • TPM is NOT exposed. vz on Apple Silicon does not surface a vTPM through
#     Lima. Switch to UTM if measured boot is required.
#
#   • The `ops` admin account from Section 5.3 is NOT created. Lima manages
#     SSH for the host user automatically; `limactl shell` is the admin entry.
#
#   • Section 5.2 ext4 → ZFS (data partitions only). A second 200 GiB virtual
#     disk hosts an encrypted zpool `tank` with datasets for /var/lib/docker,
#     /srv/hermes, /var/lib/hermes, /var/log/hermes. Pool encryption is
#     aes-256-gcm with a keyfile at /etc/zfs/tank.key (auto-loaded at boot).
#     Threat model: protects against offline theft of the data disk image,
#     NOT against an attacker with root inside the VM.
#
#   • Snapshots (Section 14) are taken via:
#       limactl stop ubuntu-hermes
#       limactl snapshot create ubuntu-hermes --tag hardened-baseline
#     ZFS dataset snapshots (`zfs snapshot tank/<ds>@tag`) are also available
#     for fine-grained rollback.
#
# =============================================================================

vmType: vz

# Tune to your host. Defaults target a 10-core / 16 GiB Mac with host-side
# Ollama (~9 GiB when loaded). See README.md > C. Recommended sizing.
cpus: 6
memory: "8GiB"
disk: "60GiB"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# Second virtual disk for the ZFS data pool. Format=false → unformatted raw
# block device; the provision script discovers it and runs `zpool create`.
additionalDisks:
  - name: "tank"
    size: "200GiB"
    format: false

# Section 4.5 / 4.6 — no shared mounts. (Empty list is sufficient; setting
# mountTypesUnsupported as well conflicts with Lima's default mountType.)
mounts: []

# User-mode NAT only — VM cannot reach the host LAN.
networks: []

ssh:
  loadDotSSHPubKeys: true
  forwardAgent: false
  forwardX11: false

containerd:
  system: false
  user: false

# -----------------------------------------------------------------------------
# Provisioning order (UFW is last so earlier outbound apt traffic isn't blocked):
#   1. apt full-upgrade
#   2. install security packages (no system Docker — Hermes uses rootless dockerd)
#   3. SSH hardening
#   4. DNS hardening
#   5. ZFS pool + datasets
#   6. cloud-final.service noise silencer (depends on ZFS being live)
#   7. Hermes runtime user (datasets mounted; subuid/subgid + lingering for rootless dockerd)
#   8. Hermes Agent system prerequisites (rootless docker apt repo, build deps, playwright libs)
#   9. hermes-gateway.service systemd unit (disabled; operator starts manually)
#  10. unattended-upgrades
#  11. UFW
# -----------------------------------------------------------------------------
provision:

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get -y full-upgrade

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get install -y \
        ufw \
        fail2ban \
        auditd \
        unattended-upgrades \
        curl \
        jq \
        git \
        htop

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      mkdir -p /etc/ssh/sshd_config.d
      cat > /etc/ssh/sshd_config.d/99-hermes-hardening.conf <<'EOF'
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      PermitEmptyPasswords no
      MaxAuthTries 3
      X11Forwarding no
      AllowTcpForwarding no
      AllowAgentForwarding no
      PermitTunnel no
      EOF
      sshd -t
      systemctl restart ssh

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      mkdir -p /etc/systemd/resolved.conf.d
      cat > /etc/systemd/resolved.conf.d/99-hermes.conf <<'EOF'
      [Resolve]
      DNS=1.1.1.2 9.9.9.9
      FallbackDNS=1.0.0.2
      DNSSEC=yes
      EOF
      systemctl restart systemd-resolved

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get install -y zfsutils-linux

      # Keyfile (idempotent — never regenerate, would lock the existing pool out)
      install -d -m 0700 -o root -g root /etc/zfs
      if [ ! -s /etc/zfs/tank.key ]; then
        umask 077
        dd if=/dev/urandom of=/etc/zfs/tank.key bs=32 count=1 status=none
        chmod 0400 /etc/zfs/tank.key
      fi

      # Pool — discover the unformatted data disk by exclusion (vz device
      # names can vary between boots); only create if `tank` doesn't exist.
      if ! zpool list tank >/dev/null 2>&1; then
        ROOT_SRC=$(findmnt -no SOURCE /)
        ROOT_DEV=$(lsblk -no PKNAME "$ROOT_SRC")
        DATA_DEV=""
        for dev in $(lsblk -dno NAME,TYPE | awk '$2=="disk"{print $1}'); do
          [ "$dev" = "$ROOT_DEV" ] && continue
          if ! blkid "/dev/$dev" >/dev/null 2>&1; then
            DATA_DEV="/dev/$dev"
            break
          fi
        done
        [ -n "$DATA_DEV" ] || { echo "no candidate data disk found" >&2; exit 1; }
        zpool create -o ashift=12 \
          -O compression=lz4 \
          -O atime=off \
          -O xattr=sa \
          -O acltype=posixacl \
          -O mountpoint=none \
          -O encryption=aes-256-gcm \
          -O keyformat=raw \
          -O keylocation=file:///etc/zfs/tank.key \
          tank "$DATA_DEV"
      fi

      # Datasets inherit encryption from `tank`. Idempotent.
      # tank/hermes hosts hermes's home, including rootless dockerd's data root
      # at /srv/hermes/.local/share/docker — no separate dataset needed.
      zfs list tank/hermes     >/dev/null 2>&1 || zfs create -o mountpoint=/srv/hermes     tank/hermes
      zfs list tank/hermes-var >/dev/null 2>&1 || zfs create -o mountpoint=/var/lib/hermes tank/hermes-var
      zfs list tank/hermes-log >/dev/null 2>&1 || zfs create -o mountpoint=/var/log/hermes tank/hermes-log

      # Install zfs-load-key.service. Ubuntu ships an empty unit file at
      # /lib/systemd/system/zfs-load-key.service (effectively masked). With
      # keylocation=file:// we need a real loader to run after import and
      # before mount, otherwise zfs-mount.service mounts only unencrypted
      # datasets and our encrypted ones stay locked.
      cat > /etc/systemd/system/zfs-load-key.service <<'UNIT'
      [Unit]
      Description=Load encryption keys for ZFS file systems
      DefaultDependencies=no
      After=zfs-import.target
      Before=zfs-mount.service
      Requires=zfs-import.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/sbin/zfs load-key -a

      [Install]
      WantedBy=zfs-mount.service
      UNIT
      systemctl daemon-reload
      systemctl enable zfs-import-cache.service zfs-mount.service zfs.target zfs-load-key.service 2>/dev/null || true

      # Make sure the running system is in the correct state for subsequent
      # provision steps (Docker needs /var/lib/docker mounted now).
      zfs load-key -a 2>/dev/null || true
      zfs mount -a   2>/dev/null || true

  - mode: system
    script: |
      #!/bin/bash
      # Cap ZFS ARC so guest page cache does not compete with host Ollama on
      # 16 GiB Macs. Hermes workload is ~300 MiB; default ARC can reach ~6 GiB.
      set -eux -o pipefail
      ARC_MAX_BYTES=2147483648
      install -d /etc/modprobe.d
      printf 'options zfs zfs_arc_max=%s\n' "${ARC_MAX_BYTES}" > /etc/modprobe.d/zfs.conf
      if [ -w /sys/module/zfs/parameters/zfs_arc_max ]; then
        echo "${ARC_MAX_BYTES}" > /sys/module/zfs/parameters/zfs_arc_max
      fi

  - mode: system
    script: |
      #!/bin/bash
      # Silence the perpetual cloud-final.service failure caused by Lima's
      # boot.sh chain. Lima's 05-lima-disks.sh hardcodes
      #     mount -t ext4 /dev/vdb1 /mnt/lima-tank
      # but on this VM /dev/vdb1 is a ZFS member partition (the encrypted
      # `tank` pool from the previous provision step). The mount fails,
      # boot.sh exits 1, scripts_per_boot reports a runparts failure, and
      # cloud-final.service exits 1 every boot. The error is purely
      # cosmetic — pool import, key load, dataset mounts, Docker, UFW, etc.
      # all complete fine. Patches to /var/lib/cloud/scripts/per-boot/* are
      # NOT durable: cloud-init's cached cidata regenerates write_files on
      # every boot, reverting any in-place edit. The clean fix is at the
      # systemd layer: tell cloud-final.service to accept exit 1 as success.
      set -eux -o pipefail
      mkdir -p /etc/systemd/system/cloud-final.service.d
      cat > /etc/systemd/system/cloud-final.service.d/swallow-exit.conf <<'EOF'
      # Lima/vz + ZFS workaround: cloud-init scripts_per_boot always exits 1
      # because Lima boot.sh chain includes 05-lima-disks.sh, which hardcodes
      # 'mount -t ext4 /dev/vdb1' against a ZFS member partition. The error
      # is cosmetic; data and services come up fine. Accept exit 1 as success.
      [Service]
      SuccessExitStatus=1
      EOF
      chmod 0644 /etc/systemd/system/cloud-final.service.d/swallow-exit.conf
      systemctl daemon-reload

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! id hermes >/dev/null 2>&1; then
        useradd -r -m -d /srv/hermes -s /bin/bash hermes
      fi
      # Shell may have been /usr/sbin/nologin in older provisions; fix idempotently.
      [ "$(getent passwd hermes | cut -d: -f7)" = "/bin/bash" ] || usermod -s /bin/bash hermes
      # subuid/subgid for rootless dockerd user-namespace mapping.
      grep -q '^hermes:' /etc/subuid || usermod --add-subuids 100000-165535 hermes
      grep -q '^hermes:' /etc/subgid || usermod --add-subgids 100000-165535 hermes
      # Lingering so user-systemd / dbus session / XDG_RUNTIME_DIR come up at boot
      # without an interactive login. Required for rootless dockerd at boot.
      loginctl show-user hermes -p Linger 2>/dev/null | grep -q 'Linger=yes' \
        || loginctl enable-linger hermes
      for d in /srv/hermes /var/lib/hermes /var/log/hermes; do
        mountpoint -q "$d" || { echo "$d not a mountpoint — ZFS step did not run cleanly" >&2; exit 1; }
        chown hermes:hermes "$d"
      done
      chmod 750 /var/log/hermes

  - mode: system
    script: |
      #!/bin/bash
      # Hermes Agent system prerequisites:
      #   - Docker upstream apt repo (Ubuntu's docker.io omits docker-ce-rootless-extras,
      #     which ships dockerd-rootless-setuptool.sh).
      #   - build deps for Python wheels (cffi etc.) used by Hermes.
      #   - rootless docker runtime: uidmap, dbus-user-session, fuse-overlayfs,
      #     slirp4netns, iptables.
      #   - Playwright Chromium runtime libs (the per-user installer would otherwise
      #     try to apt-install these via sudo, which hermes does not have).
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
        install -d -m 0755 /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      fi
      if [ ! -f /etc/apt/sources.list.d/docker.list ]; then
        ARCH=$(dpkg --print-architecture)
        . /etc/os-release
        cat > /etc/apt/sources.list.d/docker.list <<EOF
      deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable
      EOF
        apt-get update
      fi
      # Several Playwright runtime libs were renamed with `t64` suffixes in
      # Ubuntu 24.04 (noble) as part of the time_t bit-width transition:
      # libasound2, libatk1.0-0, libatk-bridge2.0-0, libcups2, libgtk-3-0.
      # The non-t64 names still exist as transitional dummies but have no
      # installation candidate on noble — apt-get fails with "no installation
      # candidate". Use the t64 names directly.
      apt-get install -y \
        build-essential python3-dev libffi-dev \
        ripgrep ffmpeg \
        uidmap dbus-user-session fuse-overlayfs slirp4netns iptables \
        libnss3 libnspr4 libdbus-1-3 libatk1.0-0t64 libatk-bridge2.0-0t64 \
        libcups2t64 libdrm2 libgbm1 libxkbcommon0 libxcomposite1 libxdamage1 \
        libxfixes3 libxrandr2 libgtk-3-0t64 libpango-1.0-0 libcairo2 libasound2t64 \
        docker-ce docker-ce-cli containerd.io docker-ce-rootless-extras

      # Mask the system docker.service / docker.socket. We installed docker-ce
      # only because docker-ce-rootless-extras depends on it for the dockerd
      # binary. The system-level units must NEVER be activatable: hermes runs
      # rootless dockerd as a user-systemd service instead. Masking redirects
      # both units to /dev/null so even socket activation cannot start them.
      systemctl disable --now docker.service docker.socket 2>/dev/null || true
      systemctl mask docker.service docker.socket
      # docker-ce's postinst briefly starts dockerd before we mask, which
      # leaves /var/run/docker.sock as an orphaned file. Remove it so
      # verify.sh's "no system docker socket" assertion holds.
      rm -f /var/run/docker.sock

  - mode: system
    script: |
      #!/bin/bash
      # Drop the hermes-gateway.service systemd unit. NOT enabled here —
      # operator starts via ./scripts/hermes-gateway.sh after API key is set.
      # Hardening goes beyond upstream's reference (NoNewPrivileges,
      # ProtectSystem=strict, PrivateTmp): empty CapabilityBoundingSet so the
      # unit can never gain CAP_NET_ADMIN (UFW) or CAP_NET_BIND_SERVICE (port
      # 22 hijack); MemoryDenyWriteExecute; SystemCallFilter=@system-service.
      # %U in Environment= expands in the system (root) context, resolving to
      # UID 0 instead of hermes's UID. Hardcode 999 (the stable UID assigned
      # by useradd -r from the user-creation step) and use `id -u hermes` in
      # ExecStartPre so the socket path is resolved at exec time, not parse time.
      set -eux -o pipefail
      cat > /etc/systemd/system/hermes-gateway.service <<'EOF'
      [Unit]
      Description=Hermes Agent gateway (Nous Research)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=hermes
      Group=hermes
      Environment=HOME=/srv/hermes
      Environment=XDG_RUNTIME_DIR=/run/user/999
      Environment=DOCKER_HOST=unix:///run/user/999/docker.sock
      Environment=PATH=/srv/hermes/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ExecStartPre=/bin/sh -c 'uid=$(id -u hermes); i=0; until test -S "/run/user/$uid/docker.sock"; do i=$((i+1)); [ $i -ge 30 ] && exit 1; sleep 1; done'
      ExecStart=/srv/hermes/.local/bin/hermes gateway
      Restart=on-failure
      RestartSec=5
      TimeoutStopSec=210

      NoNewPrivileges=yes
      ProtectSystem=strict
      ProtectHome=read-only
      ReadWritePaths=/srv/hermes /var/lib/hermes /var/log/hermes
      PrivateTmp=yes
      PrivateDevices=yes
      ProtectKernelTunables=yes
      ProtectKernelModules=yes
      ProtectKernelLogs=yes
      ProtectControlGroups=yes
      RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6
      RestrictSUIDSGID=yes
      LockPersonality=yes
      MemoryDenyWriteExecute=yes
      CapabilityBoundingSet=
      AmbientCapabilities=
      SystemCallFilter=@system-service
      SystemCallArchitectures=native

      [Install]
      WantedBy=multi-user.target
      EOF
      chmod 0644 /etc/systemd/system/hermes-gateway.service
      systemctl daemon-reload

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      cat > /etc/apt/apt.conf.d/20auto-upgrades <<'EOF'
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      EOF
      systemctl enable --now unattended-upgrades

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      ufw --force reset
      ufw default deny incoming
      ufw default deny outgoing
      ufw allow out 53
      ufw allow out 80/tcp
      ufw allow out 443/tcp
      ufw allow out 123/udp
      ufw allow 22/tcp
      ufw deny out to 10.0.0.0/8
      ufw deny out to 172.16.0.0/12
      ufw deny out to 192.168.0.0/16
      ufw --force enable
      ufw status verbose

probes:
  # `cloud-init status --wait` would hang here because Lima's own 05-lima-disks.sh
  # always fails (it tries `mount -t ext4 /dev/vdb1`, but vdb1 is a ZFS member),
  # and cloud-final inherits that error state. Lima's boot.sh writes
  # /run/lima-boot-done at the very end of its boot script chain regardless
  # of per-script failures — that's our reliable boot-complete signal.
  - description: "wait for Lima boot.sh to write /run/lima-boot-done"
    script: |
      #!/bin/bash
      set -eu
      until [ -f /run/lima-boot-done ]; do sleep 1; done
    hint: |
      /run/lima-boot-done was never written. Inspect Lima's boot script chain:
        limactl shell ubuntu-hermes -- sudo journalctl -u cloud-final --no-pager
        limactl shell ubuntu-hermes -- ls -l /run/lima-boot-done
